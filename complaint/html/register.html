<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

<h1>Register</h1>

<form id="registerForm">

<input type="text"
       id="name"
       placeholder="Full Name"
       required>

<select id="role">

<option value="Vendor">
Vendor
</option>

<option value="Customer">
Customer
</option>

</select>

<input type="email"
       id="email"
       placeholder="Email"
       required>

<input type="password"
       id="password"
       placeholder="Password"
       required>

<button type="submit">
Register
</button>

</form>

<a href="index.html">
Back to Login
</a>

</div>

<script src="js/auth.js"></script>

</body>
</html>
