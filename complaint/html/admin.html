<body>

<div class="admin-container">

<h1>Admin Dashboard</h1>

<!-- 🔥 SCROLLABLE COMPLAINT SECTION -->
<div id="adminList" style="
    max-height: 300px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 10px;
    background: #fff;
    margin-bottom: 20px;
"></div>

<table>

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Role</th>
<th>Subject</th>
<th>Action Status</th>
<th>Admin Note</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="complaintsTable">
</tbody>

</table>

<!-- MODAL -->
<div id="detailsModal" class="modal">

<div class="modal-content">

<h2>Complaint Details</h2>

<p><strong>Name:</strong>
<span id="viewName"></span></p>

<p><strong>Email:</strong>
<span id="viewEmail"></span></p>

<p><strong>Role:</strong>
<span id="viewRole"></span></p>

<p><strong>Subject:</strong>
<span id="viewSubject"></span></p>

<p><strong>Complaint:</strong>
<span id="viewComplaint"></span></p>

<button onclick="closeModal()">
Close
</button>

</div>

</div>

<button onclick="logout()">
Logout
</button>

</div>

<script src="js/admin.js"></script>

</body>
