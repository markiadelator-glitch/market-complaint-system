<!DOCTYPE html>
<html>
<head>
    <title>Market Complaint System</title>

    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
            padding:20px;
        }

        /* 🔥 CENTER TITLE */
        .title{
            text-align:center;
            font-size:24px;
            font-weight:bold;
            margin-bottom:10px;
            color:#333;
        }

        .box{
            background:white;
            padding:20px;
            max-width:600px;
            margin:auto;
            margin-top:20px;
            border-radius:10px;
        }

        input, textarea, select{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .hidden{
            display:none;
        }

        .item{
            background:#eee;
            padding:10px;
            margin:10px 0;
        }
    </style>
</head>

<body>

<!-- 🔥 TITLE ADDED -->
<div class="title">
    MARKET COMPLAINT & FEEDBACK SYSTEM
</div>

<!-- REGISTER -->
<div class="box" id="registerBox">
    <h2>Register</h2>

    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPass" placeholder="Password">

    <select id="role">
        <option value="Customer">Customer</option>
        <option value="Vendor">Vendor</option>
        <option value="Admin">Admin</option>
    </select>

    <button onclick="register()">Register</button>

    <p id="registerLink">
    No account?
    <a href="register.html">Register Here</a>
</p>
</div>

<!-- LOGIN -->
<div class="box" id="loginBox">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<!-- USER DASHBOARD -->
<div class="box hidden" id="userDash">
    <h2>User Dashboard</h2>

    <h3 id="welcome"></h3>

    <input type="text" id="subject" placeholder="Complaint Subject">
    <textarea id="message" placeholder="Write complaint..."></textarea>

    <button onclick="submitComplaint()">Submit Complaint</button>

    <h3>Your Complaints</h3>
    <div id="userList"></div>

    <button onclick="logout()">Logout</button>
</div>

<!-- ADMIN DASHBOARD -->
<div class="box hidden" id="adminDash">
    <h2>Admin Dashboard</h2>

    <h3>All Complaints</h3>
    <div id="adminList"></div>

    <button onclick="logout()">Logout</button>
</div>

<script>

let currentUser = null;

// REGISTER
function register(){

    let name = document.getElementById("name").value;
    let email = document.getElementById("regEmail").value;
    let pass = document.getElementById("regPass").value;
    let role = document.getElementById("role").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    users.push({name,email,pass,role});

    localStorage.setItem("users", JSON.stringify(users));

    alert("Registered Successfully! Now login.");

    document.getElementById("registerBox").classList.add("hidden");
    document.getElementById("loginBox").classList.remove("hidden");
}

// LOGIN
function login(){

    let email = document.getElementById("email").value;
    let pass = document.getElementById("pass").value;

    // ADMIN LOGIN FIXED
    if(email === "admin@gmail.com" && pass === "admin123"){

        currentUser = {name:"Admin", role:"Admin"};

        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("adminDash").classList.remove("hidden");

        loadAdmin();
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let user = users.find(u => u.email === email && u.pass === pass);

    if(user){

        currentUser = user;

        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("userDash").classList.remove("hidden");

        document.getElementById("welcome").innerText =
        "Welcome " + user.name + " (" + user.role + ")";

        loadUser();

    } else {
        alert("Invalid login");
    }
}

// SUBMIT COMPLAINT
function submitComplaint(){

    let subject = document.getElementById("subject").value;
    let message = document.getElementById("message").value;

    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

    complaints.push({
        user: currentUser.name,
        role: currentUser.role,
        subject,
        message,
        status:"Pending"
    });

    localStorage.setItem("complaints", JSON.stringify(complaints));

    loadUser();
}

// USER VIEW
function loadUser(){

    let box = document.getElementById("userList");
    box.innerHTML = "";

    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

    complaints
    .filter(c => c.user === currentUser.name)
    .forEach(c => {

        box.innerHTML += `
        <div class="item">
            <b>${c.subject}</b><br>
            ${c.message}<br>
            Status: ${c.status}
        </div>`;
    });
}

// ADMIN VIEW
function loadAdmin(){

    let box = document.getElementById("adminList");
    box.innerHTML = "";

    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

    complaints.forEach(c => {

        box.innerHTML += `
        <div class="item">
            <b>${c.subject}</b><br>
            ${c.message}<br>
            By: ${c.user} (${c.role})<br>
            Status: ${c.status}
        </div>`;
    });
}

// LOGOUT
function logout(){
    location.reload();
}

</script>

</body>
</html>
